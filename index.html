<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Battle Boy">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#0a0a12">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="apple-touch-icon" href="icon.svg">
  <title>Battle Boy — Twin-Stick Arena Shooter</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #0a0a12;
      font-family: "Courier New", monospace;
      touch-action: none;
      overscroll-behavior: none;
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
    }
    #gameCanvas {
      display: block;
      margin: 0 auto;
      cursor: crosshair;
      touch-action: none;
      position: relative;
      z-index: 1;
    }
    body.title-cursor #gameCanvas,
    body.gameover-tap #gameCanvas {
      cursor: default;
      pointer-events: none;
    }
    body.touch-mode #gameCanvas {
      cursor: default;
      pointer-events: none;
    }

    /* Portrait phone: canvas fills height, sticks overlay bottom */
    body.portrait-layout {
      height: 100dvh;
      min-height: 100dvh;
    }
    body.portrait-layout #gameCanvas {
      margin: 0;
      max-width: none;
      max-height: none;
    }

    body.game-fullscreen,
    body.pseudo-fullscreen {
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0a0a12;
    }
    body.game-fullscreen #gameCanvas,
    body.pseudo-fullscreen #gameCanvas {
      margin: 0;
      max-width: 100vw;
      max-height: 100vh;
    }

    #fsBtn {
      display: none;
      position: fixed;
      top: max(10px, env(safe-area-inset-top, 10px));
      right: max(10px, env(safe-area-inset-right, 10px));
      z-index: 101;
      pointer-events: none;
      touch-action: manipulation;
      padding: 8px 12px;
      border: 2px solid rgba(0, 240, 255, 0.55);
      border-radius: 6px;
      background: rgba(8, 12, 24, 0.85);
      color: #00f0ff;
      font: 11px "Courier New", monospace;
      letter-spacing: 0.08em;
      box-shadow: 0 0 14px rgba(0, 240, 255, 0.25);
      -webkit-tap-highlight-color: transparent;
    }
    #fsBtn:active { background: rgba(0, 240, 255, 0.2); }
    body.playing-ui #fsBtn {
      display: block;
      pointer-events: auto;
    }
    body.standalone-mode #fsBtn { display: none !important; }

    #pauseBtn {
      display: none;
      position: fixed;
      z-index: 101;
      pointer-events: none;
      touch-action: manipulation;
      padding: 6px 14px;
      min-width: 72px;
      border: 2px solid rgba(255, 238, 0, 0.55);
      border-radius: 6px;
      background: rgba(8, 12, 24, 0.88);
      color: #ffee00;
      font: bold 11px "Courier New", monospace;
      letter-spacing: 0.1em;
      box-shadow: 0 0 12px rgba(255, 238, 0, 0.2);
      -webkit-tap-highlight-color: transparent;
    }
    #pauseBtn:active { background: rgba(255, 238, 0, 0.18); }
    body.playing-ui #pauseBtn {
      display: block;
      pointer-events: auto;
    }
    body.portrait-layout #pauseBtn {
      padding: 4px 10px;
      min-width: 56px;
      font-size: 10px;
      letter-spacing: 0.06em;
    }
    body.touch-play-layout #pauseBtn {
      left: 50%;
      top: auto;
      bottom: max(78px, calc(env(safe-area-inset-bottom, 10px) + 62px));
      transform: translateX(-50%);
      min-width: 64px;
      z-index: 102;
    }
    body.tablet-layout .joystick-zone {
      width: 156px;
      height: 172px;
    }
    body.tablet-layout .joystick-base {
      width: 140px;
      height: 140px;
    }
    body.tablet-layout.portrait-layout .joystick-zone {
      width: 120px;
      height: 132px;
    }

    #leaderboardBtn {
      display: none;
      position: fixed;
      left: 50%;
      bottom: max(18%, 140px);
      transform: translateX(-50%) translateX(130px);
      z-index: 101;
      pointer-events: auto;
      touch-action: manipulation;
      padding: 14px 22px;
      min-width: 0;
      border: 2px solid rgba(255, 238, 0, 0.65);
      border-radius: 8px;
      background: rgba(12, 10, 28, 0.92);
      color: #ffe600;
      font: bold 13px "Courier New", monospace;
      letter-spacing: 0.1em;
      box-shadow: 0 0 18px rgba(255, 238, 0, 0.25);
      -webkit-tap-highlight-color: transparent;
    }
    #leaderboardBtn:active {
      background: rgba(255, 238, 0, 0.15);
    }
    body.title-cursor #leaderboardBtn,
    body.gameover-tap #leaderboardBtn {
      display: block;
    }
    body.title-cursor #leaderboardBtn {
      transform: translateX(-50%);
      bottom: max(14%, 108px);
    }
    body.gameover-tap #retryBtn {
      transform: translateX(-50%) translateX(-130px);
    }
    body.gameover-tap #leaderboardBtn {
      transform: translateX(-50%) translateX(130px);
    }
    body.portrait-layout #leaderboardBtn {
      transform: translateX(-50%);
      bottom: max(12%, 100px);
      left: 50%;
      margin-left: 0;
    }
    body.portrait-layout #retryBtn {
      bottom: max(20%, 168px);
      transform: translateX(-50%);
    }
    body.portrait-layout.gameover-tap #leaderboardBtn {
      bottom: max(14%, 118px);
    }
    body.portrait-layout.title-cursor #leaderboardBtn {
      bottom: max(14%, 118px);
    }

    #leaderboardModal {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 110;
      align-items: center;
      justify-content: center;
      padding: max(16px, env(safe-area-inset-top)) max(16px, env(safe-area-inset-right))
        max(16px, env(safe-area-inset-bottom)) max(16px, env(safe-area-inset-left));
      background: rgba(4, 6, 14, 0.82);
      pointer-events: none;
    }
    #leaderboardModal.open {
      display: flex;
      pointer-events: auto;
    }
    #leaderboardPanel {
      width: min(360px, 92vw);
      max-height: 70vh;
      overflow: auto;
      padding: 18px 20px 16px;
      border: 2px solid rgba(0, 240, 255, 0.55);
      border-radius: 10px;
      background: rgba(8, 12, 24, 0.96);
      box-shadow: 0 0 28px rgba(0, 240, 255, 0.2);
      color: #e8f4ff;
      font: 13px/1.5 "Courier New", monospace;
    }
    #leaderboardPanel h2 {
      margin: 0 0 12px;
      font-size: 15px;
      letter-spacing: 0.12em;
      color: #00f0ff;
      text-align: center;
    }
    #leaderboardList {
      margin: 0 0 14px;
      padding: 0;
      list-style: none;
    }
    #leaderboardList li {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      padding: 6px 0;
      border-bottom: 1px solid rgba(51, 68, 85, 0.5);
      color: #aaf8ff;
    }
    #leaderboardList li:first-child { color: #ffe600; font-weight: bold; }
    #leaderboardList .lb-empty {
      text-align: center;
      color: #556677;
      border: none;
    }
    #leaderboardClose {
      display: block;
      width: 100%;
      padding: 10px;
      border: 2px solid rgba(255, 238, 0, 0.55);
      border-radius: 6px;
      background: rgba(255, 238, 0, 0.1);
      color: #ffe600;
      font: bold 12px "Courier New", monospace;
      letter-spacing: 0.1em;
      touch-action: manipulation;
    }

    /* iOS Safari: cannot hide browser chrome in-tab — guide Add to Home Screen */
    #iosInstall {
      display: none;
      position: fixed;
      left: max(12px, env(safe-area-inset-left, 12px));
      right: max(12px, env(safe-area-inset-right, 12px));
      top: max(12px, env(safe-area-inset-top, 12px));
      z-index: 60;
      pointer-events: none;
      padding: 14px 16px 12px;
      border: 2px solid rgba(255, 238, 0, 0.7);
      border-radius: 10px;
      background: rgba(12, 10, 28, 0.94);
      color: #ffe600;
      font: 12px/1.45 "Courier New", monospace;
      box-shadow: 0 0 24px rgba(255, 238, 0, 0.2);
    }
    #iosInstall.visible {
      display: block;
      pointer-events: auto;
    }
    #iosInstall h2 {
      margin: 0 0 8px;
      font-size: 13px;
      letter-spacing: 0.1em;
      color: #00f0ff;
    }
    #iosInstall ol {
      margin: 0 0 10px 18px;
      padding: 0;
      color: #e8f4ff;
    }
    #iosInstall li { margin-bottom: 4px; }
    #iosInstall .ios-install-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    #iosInstall button {
      flex: 1;
      min-width: 120px;
      padding: 10px;
      border-radius: 6px;
      font: 11px "Courier New", monospace;
      letter-spacing: 0.06em;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }
    #iosInstallGotIt {
      border: 2px solid rgba(0, 240, 255, 0.55);
      background: rgba(0, 240, 255, 0.12);
      color: #00f0ff;
    }
    #iosInstallShare {
      border: 2px solid rgba(255, 238, 0, 0.6);
      background: rgba(255, 238, 0, 0.12);
      color: #ffe600;
    }

    /* Virtual twin-stick overlays (phone / tablet) */
    .touch-ui {
      display: none;
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 20;
    }
    .touch-ui.active { display: block; }
    body.portrait-layout .joystick-zone {
      bottom: max(10px, env(safe-area-inset-bottom, 10px));
      width: 108px;
      height: 120px;
    }
    body.portrait-layout .joystick-base {
      width: 98px;
      height: 98px;
    }
    body.portrait-layout .joystick-knob {
      width: 40px;
      height: 40px;
      margin: -20px 0 0 -20px;
    }

    /* Full-screen tap target for title / game over (mobile + desktop) */
    #screenTap {
      display: none;
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 50;
      pointer-events: auto;
      touch-action: manipulation;
      -webkit-touch-callout: none;
      background: transparent;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    body.gameover-tap #screenTap {
      display: block;
    }
    body.title-cursor #screenTap {
      display: none;
    }

    #gameUI {
      position: fixed;
      inset: 0;
      z-index: 100;
      pointer-events: none;
    }
    #gameUI .ui-hit {
      pointer-events: auto;
      touch-action: manipulation;
      -webkit-tap-highlight-color: rgba(0, 240, 255, 0.25);
    }

    #startBtn, #retryBtn {
      display: none;
      position: fixed;
      left: 50%;
      bottom: max(18%, 140px);
      transform: translateX(-50%);
      z-index: 101;
      pointer-events: auto;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
      padding: 16px 44px;
      min-width: 220px;
      border: 2px solid #e8f4ff;
      border-radius: 8px;
      font: bold 18px "Courier New", monospace;
      letter-spacing: 0.14em;
      text-align: center;
      cursor: pointer;
    }
    #startBtn {
      color: #061018;
      background: linear-gradient(180deg, #00f0ff 0%, #00b8d4 100%);
      box-shadow: 0 0 22px rgba(0, 240, 255, 0.55), 0 4px 0 #007799;
      animation: startBtnPulse 2.2s ease-in-out infinite;
    }
    #retryBtn {
      color: #180818;
      background: linear-gradient(180deg, #ff66cc 0%, #dd00aa 100%);
      box-shadow: 0 0 22px rgba(255, 0, 170, 0.5), 0 4px 0 #990066;
      animation: startBtnPulse 2.2s ease-in-out infinite;
    }
    #startBtn:active, #retryBtn:active {
      transform: translateX(-50%) translateY(2px);
      box-shadow: 0 0 14px rgba(0, 240, 255, 0.4), 0 2px 0 #007799;
    }
    #retryBtn:active {
      box-shadow: 0 0 14px rgba(255, 0, 170, 0.4), 0 2px 0 #990066;
    }
    body.title-cursor #startBtn { display: block; }
    body.gameover-tap #retryBtn { display: block; }
    @keyframes startBtnPulse {
      0%, 100% { filter: brightness(1); }
      50% { filter: brightness(1.15); }
    }
    body.portrait-layout #startBtn,
    body.portrait-layout #retryBtn {
      bottom: max(20%, 168px);
      min-width: 240px;
      padding: 18px 52px;
      font-size: 20px;
    }

    .joystick-zone {
      position: absolute;
      bottom: max(20px, env(safe-area-inset-bottom, 20px));
      width: 132px;
      height: 148px;
      pointer-events: auto;
      touch-action: none;
    }
    .joystick-left {
      left: max(14px, env(safe-area-inset-left, 14px));
    }
    .joystick-right {
      right: max(14px, env(safe-area-inset-right, 14px));
    }
    .joystick-label {
      display: block;
      margin-top: 6px;
      text-align: center;
      font-size: 10px;
      letter-spacing: 0.12em;
      color: rgba(0, 240, 255, 0.65);
      font-family: "Courier New", monospace;
      pointer-events: none;
    }
    .joystick-right .joystick-label { color: rgba(255, 0, 170, 0.7); }
    .joystick-base {
      position: relative;
      width: 120px;
      height: 120px;
      margin: 0 auto;
      border-radius: 50%;
      border: 2px solid rgba(0, 240, 255, 0.5);
      background: radial-gradient(circle at 50% 50%, rgba(0, 40, 60, 0.5), rgba(8, 8, 16, 0.65));
      box-shadow: 0 0 18px rgba(0, 240, 255, 0.25), inset 0 0 24px rgba(0, 240, 255, 0.06);
    }
    .joystick-right .joystick-base {
      border-color: rgba(255, 0, 170, 0.55);
      box-shadow: 0 0 18px rgba(255, 0, 170, 0.25), inset 0 0 24px rgba(255, 0, 170, 0.06);
    }
    .joystick-knob {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 46px;
      height: 46px;
      transform: translate(-50%, -50%);
      border-radius: 50%;
      border: 2px solid rgba(232, 244, 255, 0.85);
      background: radial-gradient(circle at 35% 35%, rgba(0, 240, 255, 0.35), rgba(0, 20, 40, 0.9));
      box-shadow: 0 0 12px rgba(0, 240, 255, 0.45);
      will-change: transform;
    }
    .joystick-right .joystick-knob {
      border-color: rgba(255, 200, 240, 0.9);
      background: radial-gradient(circle at 35% 35%, rgba(255, 0, 170, 0.35), rgba(40, 0, 30, 0.9));
      box-shadow: 0 0 12px rgba(255, 0, 170, 0.45);
    }
  </style>
</head>
<body>
  <canvas id="gameCanvas"></canvas>
  <div id="screenTap" role="button" tabindex="0" aria-label="Tap to continue"></div>
  <div id="gameUI">
    <button type="button" id="startBtn" class="ui-hit"
      onclick="event.stopPropagation();window.__bbStart&&window.__bbStart();return false;">START</button>
    <button type="button" id="retryBtn" class="ui-hit"
      onclick="event.stopPropagation();window.__bbStart&&window.__bbStart();return false;">PLAY AGAIN</button>
    <button type="button" id="leaderboardBtn" class="ui-hit">LEADERBOARD</button>
    <button type="button" id="pauseBtn" class="ui-hit" aria-label="Pause game" title="Pause (P)">PAUSE</button>
    <button type="button" id="fsBtn" class="ui-hit" aria-label="Toggle fullscreen" title="Fullscreen (F)">FULLSCREEN</button>
  </div>
  <div id="iosInstall" role="dialog" aria-labelledby="iosInstallTitle">
    <h2 id="iosInstallTitle">HIDE SAFARI UI</h2>
    <p style="margin:0 0 8px;color:#e8f4ff;">Apple does not let websites remove the address bar inside Safari. Use <strong>Home Screen</strong> mode instead:</p>
    <ol>
      <li>Tap <strong>Share</strong> (↑) in Safari’s bottom bar</li>
      <li>Scroll → tap <strong>Add to Home Screen</strong></li>
      <li>Open <strong>Battle Boy</strong> from your home screen</li>
    </ol>
    <div class="ios-install-actions">
      <button type="button" id="iosInstallShare">HOW TO ADD</button>
      <button type="button" id="iosInstallGotIt">GOT IT</button>
    </div>
  </div>
  <div id="leaderboardModal" role="dialog" aria-labelledby="leaderboardTitle" aria-modal="true">
    <div id="leaderboardPanel">
      <h2 id="leaderboardTitle">— HIGH SCORES —</h2>
      <ol id="leaderboardList"></ol>
      <button type="button" id="leaderboardClose" class="ui-hit">CLOSE</button>
    </div>
  </div>
  <div id="touchUI" class="touch-ui" aria-hidden="true">
    <div id="stickLeft" class="joystick-zone joystick-left">
      <div class="joystick-base"><div class="joystick-knob"></div></div>
      <span class="joystick-label">MOVE</span>
    </div>
    <div id="stickRight" class="joystick-zone joystick-right">
      <div class="joystick-base"><div class="joystick-knob"></div></div>
      <span class="joystick-label">AIM / FIRE</span>
    </div>
  </div>

<script>
/* ============================================================================
   BATTLE BOY — Twin-stick arena shooter (Battle-Girl 1997 inspired)
   Pure vanilla JS · Canvas 2D · Web Audio API · No external assets
   ============================================================================ */

(function () {
  'use strict';

  // ─── Constants ───────────────────────────────────────────────────────────
  const W = 1280, H = 720;
  const ARENA = { cx: W / 2, cy: H / 2, r: 300 };
  const NODE_DIST = 220;
  const NODE_RADIUS = 28;
  const PLAYER_SPEED = 280;
  const PLAYER_RADIUS = 14;
  const BULLET_SPEED = 620;
  const FIRE_RATE = 0.08;
  const MAX_ENEMIES = 120;
  const MAX_BULLETS = 200;
  const MAX_PARTICLES = 400;
  const MAX_POWERUPS = 20;
  const TERMINUS_INTEGRITY = 120;
  const TERMINUS_NODES_ZERO = 2;

  const COLORS = {
    bg: '#080810',
    cyan: '#00f0ff',
    magenta: '#ff00aa',
    lime: '#aaff00',
    yellow: '#ffee00',
    white: '#e8f4ff',
    red: '#ff2244',
    orange: '#ff8800',
    dim: '#334455'
  };

  const NODE_NAMES = ['ALPHA', 'BETA', 'GAMMA', 'DELTA'];
  const NODE_ANGLES = [-Math.PI / 2, 0, Math.PI / 2, Math.PI]; // N E S W
  const NODE_THEME = {
    ALPHA: { healthy: '#00f0ff', glow: '#00f0ff', label: '#aaf8ff' },
    BETA:  { healthy: '#aaff00', glow: '#b8ff00', label: '#e8ffb0' },
    GAMMA: { healthy: '#ffee00', glow: '#ffe600', label: '#fff6a0' },
    DELTA: { healthy: '#ff66cc', glow: '#ff00aa', label: '#ffc0e8' }
  };
  const NODE_INFECT = '#ff2244';
  const NODE_ASSAULT = '#ff00aa';

  // ─── Canvas setup ────────────────────────────────────────────────────────
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');
  let dpr = 1;
  let scaleX = 1, scaleY = 1;
  let mouseX = W / 2, mouseY = H / 2;
  let mouseDown = false;
  let padAimX = 0, padAimY = 0, padMoveX = 0, padMoveY = 0;
  let padFire = false;
  let touchMoveX = 0, touchMoveY = 0;
  let touchAimX = 0, touchAimY = 0;

  const isTouchDevice = window.matchMedia('(pointer: coarse)').matches
    || 'ontouchstart' in window
    || navigator.maxTouchPoints > 0;

  const isIOS = /iPhone|iPad|iPod/i.test(navigator.userAgent)
    || (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
  const isStandalone = window.navigator.standalone === true
    || window.matchMedia('(display-mode: standalone)').matches
    || window.matchMedia('(display-mode: fullscreen)').matches;
  /** True when Safari still shows address bar + tabs (normal tab). */
  const isIOSSafariBrowser = isIOS && !isStandalone;

  const fsBtn = document.getElementById('fsBtn');
  const pauseBtn = document.getElementById('pauseBtn');
  const iosInstall = document.getElementById('iosInstall');
  const PAUSE_HUD_X = 12;
  const PAUSE_HUD_Y = 38;
  const IOS_INSTALL_KEY = 'battleBoy_iosInstallDismissed';
  const aspect = W / H;

  if (isStandalone) document.body.classList.add('standalone-mode');

  function viewportSize() {
    const vv = window.visualViewport;
    if (vv) return { w: vv.width, h: vv.height };
    return { w: window.innerWidth, h: window.innerHeight };
  }

  /** Tall phone layout — fill vertical screen, crop sides slightly. */
  function isPortraitPlay() {
    const { w, h } = viewportSize();
    return isTouchDevice && h > w * 1.02;
  }

  function isTabletPlay() {
    const { w, h } = viewportSize();
    return isTouchDevice && Math.min(w, h) >= 600;
  }

  function updatePlayLayoutClasses() {
    const touchPlay = isTouchDevice && (state === 'PLAYING' || state === 'PAUSED');
    document.body.classList.toggle('touch-play-layout', touchPlay);
    const tablet = isTabletPlay();
    document.body.classList.toggle('tablet-layout', tablet);
    document.body.classList.toggle('tablet-landscape', tablet && !isPortraitPlay());
  }

  function shouldShowIosInstall() {
    return isIOSSafariBrowser && !localStorage.getItem(IOS_INSTALL_KEY);
  }

  function updateIosInstallBanner() {
    if (!iosInstall) return;
    const show = shouldShowIosInstall()
      && (state === 'TITLE' || state === 'PLAYING' || state === 'PAUSED');
    iosInstall.classList.toggle('visible', show);
  }

  function dismissIosInstall() {
    localStorage.setItem(IOS_INSTALL_KEY, '1');
    updateIosInstallBanner();
  }

  if (iosInstall) {
    document.getElementById('iosInstallGotIt')?.addEventListener('click', (e) => {
      e.stopPropagation();
      dismissIosInstall();
    });
    document.getElementById('iosInstallShare')?.addEventListener('click', (e) => {
      e.stopPropagation();
      alert(
        'Add Battle Boy to your Home Screen:\n\n' +
        '1. Tap Share (↑) at the bottom of Safari\n' +
        '2. Scroll the menu and tap "Add to Home Screen"\n' +
        '3. Tap Add — then launch Battle Boy from your home screen\n\n' +
        'That version runs without Safari bars.'
      );
    });
    iosInstall.addEventListener('pointerdown', (e) => e.stopPropagation());
  }

  if (window.visualViewport) {
    window.visualViewport.addEventListener('resize', resize);
    window.visualViewport.addEventListener('scroll', resize);
  }

  function getFullscreenElement() {
    return document.fullscreenElement || document.webkitFullscreenElement || null;
  }

  function isGameFullscreen() {
    return !!getFullscreenElement() || document.body.classList.contains('pseudo-fullscreen');
  }

  function syncFullscreenClass() {
    const on = !!getFullscreenElement();
    document.body.classList.toggle('game-fullscreen', on);

    dpr = Math.min(window.devicePixelRatio || 1, 2);
    const { w: sw, h: sh } = viewportSize();

    const tablet = isTabletPlay();
    document.body.classList.toggle('portrait-layout', portrait);
    document.body.classList.toggle('tablet-layout', tablet);
    document.body.classList.toggle('tablet-landscape', tablet && !portrait);

    let cw, ch;
    if (portrait) {
      const topPad = 6;
      const bottomPad = tablet ? 168 : 148;
      const usableH = Math.max(200, sh - topPad - bottomPad);
      ch = usableH * (tablet ? 0.84 : 0.8);
      cw = ch * aspect;
      clearCanvasPosition();
      canvas.style.position = 'fixed';
      canvas.style.top = (topPad + (usableH - ch) * 0.5) + 'px';
      canvas.style.left = ((sw - cw) * 0.5) + 'px';
      canvas.style.margin = '0';
    } else if (isTouchDevice && tablet) {
      const topPad = 8;
      const bottomPad = 156;
      const usableH = Math.max(200, sh - topPad - bottomPad);
      ch = usableH * 0.9;
      cw = Math.min(ch * aspect, sw * 0.94);
      if (cw > ch * aspect) ch = cw / aspect;
      clearCanvasPosition();
      canvas.style.position = 'fixed';
      canvas.style.top = (topPad + (usableH - ch) * 0.5) + 'px';
      canvas.style.left = ((sw - cw) * 0.5) + 'px';
      canvas.style.margin = '0';
    } else if (isGameFullscreen()) {
      clearCanvasPosition();
      if (sw / sh > aspect) {
        ch = sh;
        cw = sh * aspect;
      } else {
        cw = sw;
        ch = sw / aspect;
      }
      canvas.style.margin = '0 auto';
    } else {
      clearCanvasPosition();
      let fitW = sw, fitH = sw / aspect;
      if (fitH > sh) { fitH = sh; fitW = sh * aspect; }
      cw = fitW;
      ch = fitH;
      canvas.style.margin = '0 auto';
    }

    canvas.style.width = cw + 'px';
    canvas.style.height = ch + 'px';
    canvas.width = Math.floor(cw * dpr);
    canvas.height = Math.floor(ch * dpr);

  function initVirtualJoystick(zoneEl, isAim) {
    const base = zoneEl.querySelector('.joystick-base');
    const knob = zoneEl.querySelector('.joystick-knob');
    let active = false;
    let captureId = null;
    let radius = 46;

    function syncRadius() {
      radius = Math.max(36, base.offsetWidth * 0.38);
    }
    syncRadius();
    window.addEventListener('resize', syncRadius);

    function setOutput(nx, ny) {
      if (isAim) { touchAimX = nx; touchAimY = ny; }
      else { touchMoveX = nx; touchMoveY = ny; }
    }

    function resetKnob() {
      knob.style.transform = 'translate(-50%, -50%)';
      setOutput(0, 0);
    }

    function applyFromClient(cx, cy, clientX, clientY) {
      let dx = clientX - cx;
      let dy = clientY - cy;
      const dist = Math.hypot(dx, dy);
      if (dist > radius) {
        dx = (dx / dist) * radius;
        dy = (dy / dist) * radius;
      }
      knob.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
      setOutput(dx / radius, dy / radius);
    }

    function center() {
      const r = base.getBoundingClientRect();
      return { cx: r.left + r.width / 2, cy: r.top + r.height / 2 };
    }

    function onPointerDown(e) {
      if (state !== 'PLAYING' && state !== 'PAUSED') return;
      if (active) return;
      active = true;
      captureId = e.pointerId;
      zoneEl.setPointerCapture(e.pointerId);
      e.preventDefault();
      const { cx, cy } = center();
      applyFromClient(cx, cy, e.clientX, e.clientY);
    }

    function onPointerMove(e) {
      if (!active || e.pointerId !== captureId) return;
      e.preventDefault();
      const { cx, cy } = center();
      applyFromClient(cx, cy, e.clientX, e.clientY);
    }

    function onPointerUp(e) {
      if (!active || e.pointerId !== captureId) return;
      active = false;
      captureId = null;
      try { zoneEl.releasePointerCapture(e.pointerId); } catch (_) {}
      resetKnob();
    }

    zoneEl.addEventListener('pointerdown', onPointerDown);
    zoneEl.addEventListener('pointermove', onPointerMove);
    zoneEl.addEventListener('pointerup', onPointerUp);
    zoneEl.addEventListener('pointercancel', onPointerUp);
    resetKnob();
  }

  function getMoveVector() {
    let mx = 0, my = 0;
    if (keys['KeyW'] || keys['ArrowUp']) my -= 1;
    if (keys['KeyS'] || keys['ArrowDown']) my += 1;
    if (keys['KeyA'] || keys['ArrowLeft']) mx -= 1;
    if (keys['KeyD'] || keys['ArrowRight']) mx += 1;
    // 8-dir fallback IJKL / numpad
    if (keys['KeyI'] || keys['Numpad8']) my -= 1;
    if (keys['KeyK'] || keys['Numpad2']) my += 1;
    if (keys['KeyJ'] || keys['Numpad4']) mx -= 1;
    if (keys['KeyL'] || keys['Numpad6']) mx += 1;
    if (keys['Numpad7']) { mx -= 1; my -= 1; }
    if (keys['Numpad9']) { mx += 1; my -= 1; }
    if (keys['Numpad1']) { mx -= 1; my += 1; }
    if (keys['Numpad3']) { mx += 1; my += 1; }
    mx += padMoveX + touchMoveX;
    my += padMoveY + touchMoveY;
    const len = Math.hypot(mx, my);
    if (len > 1) { mx /= len; my /= len; }
    return { mx, my };
  }

  function getAimAngle(px, py) {
    const touchMag = Math.hypot(touchAimX, touchAimY);
    if (touchMag > TOUCH_AIM_DEAD) {
      return Math.atan2(touchAimY, touchAimX);
    }
    if (Math.hypot(padAimX, padAimY) > 0.3) {
      return Math.atan2(padAimY, padAimX);
    }
    if (!isTouchDevice || document.body.classList.contains('title-cursor')) {
      let ax = mouseX - px, ay = mouseY - py;
      if (Math.hypot(ax, ay) > 8) return Math.atan2(ay, ax);
    }
    let fx = 0, fy = 0;
    if (keys['KeyI'] || keys['Numpad8']) fy -= 1;
    if (keys['KeyK'] || keys['Numpad2']) fy += 1;
    if (keys['KeyJ'] || keys['Numpad4']) fx -= 1;
    if (keys['KeyL'] || keys['Numpad6']) fx += 1;
    if (Math.hypot(fx, fy) > 0) return Math.atan2(fy, fx);
    return player.angle;

  // ─── Object pools ──────────────────────────────────────────────────────────
  function createPool(factory, max) {
    const free = [], active = [];
    for (let i = 0; i < max; i++) free.push(factory());
    return {
      spawn(init) {
        const o = free.pop() || factory();
        init(o);
        o.active = true;
        active.push(o);
        return o;
      },
      release(o) {
        o.active = false;
        const i = active.indexOf(o);
        if (i >= 0) active.splice(i, 1);
        if (free.length < max * 2) free.push(o);
      },
      active, free, clear() { active.length = 0; free.length = 0; }
    };
  }

    musicGain = audioCtx.createGain();
    musicGain.gain.value = 0.22;
    musicGain.connect(masterGain);
    sfxGain = audioCtx.createGain();

  async function resumeAudio() {
    initAudio();
    if (!audioCtx) return false;
    if (audioCtx.state === 'running') return true;
    if (!audioUnlockPromise) {
      const resumeP = audioCtx.resume().then(() => true).catch(() => false);
      const timeoutP = new Promise(r => setTimeout(() => r(false), 400));
      audioUnlockPromise = Promise.race([resumeP, timeoutP])
        .finally(() => { audioUnlockPromise = null; });
    }
    return audioUnlockPromise;
  }

  async function playSfx(type) {
    await resumeAudio();
    if (!audioCtx || audioCtx.state !== 'running') return;
    const t = audioCtx.currentTime;
    const osc = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    osc.connect(g);
    g.connect(sfxGain);

    switch (type) {
      case 'shoot':
        osc.type = 'square';
        osc.frequency.setValueAtTime(880, t);
        osc.frequency.exponentialRampToValueAtTime(220, t + 0.06);
        g.gain.setValueAtTime(0.15, t);
        g.gain.exponentialRampToValueAtTime(0.001, t + 0.06);
        osc.start(t); osc.stop(t + 0.07);
        break;
      case 'hit':
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(200, t);
        g.gain.setValueAtTime(0.2, t);
        g.gain.exponentialRampToValueAtTime(0.001, t + 0.05);
        osc.start(t); osc.stop(t + 0.06);
        break;
      case 'explode':
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(120, t);
        osc.frequency.exponentialRampToValueAtTime(40, t + 0.2);
        g.gain.setValueAtTime(0.35, t);
        g.gain.exponentialRampToValueAtTime(0.001, t + 0.25);
        osc.start(t); osc.stop(t + 0.3);
        break;
      case 'node':
        osc.type = 'triangle';
        osc.frequency.setValueAtTime(440, t);
        osc.frequency.setValueAtTime(110, t + 0.15);
        g.gain.setValueAtTime(0.25, t);
        g.gain.exponentialRampToValueAtTime(0.001, t + 0.2);
        osc.start(t); osc.stop(t + 0.22);
        break;
      case 'nodeAlert': {
        const o2 = audioCtx.createOscillator();
        const g2 = audioCtx.createGain();
        o2.type = 'square';
        o2.frequency.setValueAtTime(880, t);
        o2.frequency.exponentialRampToValueAtTime(220, t + 0.25);
        g2.gain.setValueAtTime(0.18, t);
        g2.gain.exponentialRampToValueAtTime(0.001, t + 0.28);
        o2.connect(g2);
        g2.connect(sfxGain);
        o2.start(t);
        o2.stop(t + 0.3);
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(140, t);
        osc.frequency.linearRampToValueAtTime(90, t + 0.2);
        g.gain.setValueAtTime(0.22, t);
        g.gain.exponentialRampToValueAtTime(0.001, t + 0.25);
        osc.start(t);
        osc.stop(t + 0.28);
        break;
      }
      case 'nodeInfected':
        osc.type = 'square';
        osc.frequency.setValueAtTime(330, t);
        osc.frequency.setValueAtTime(277, t + 0.08);
        osc.frequency.setValueAtTime(220, t + 0.16);
        g.gain.setValueAtTime(0.28, t);
        g.gain.exponentialRampToValueAtTime(0.001, t + 0.35);
        osc.start(t);
        osc.stop(t + 0.38);
        break;
      case 'nodeFallen':
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(220, t);
        osc.frequency.exponentialRampToValueAtTime(35, t + 0.55);
        g.gain.setValueAtTime(0.4, t);
        g.gain.exponentialRampToValueAtTime(0.001, t + 0.6);
        osc.start(t);
        osc.stop(t + 0.65);
        break;
      case 'nodeHack':
        osc.type = 'square';
        osc.frequency.setValueAtTime(120 + Math.random() * 40, t);
        g.gain.setValueAtTime(0.12, t);
        g.gain.exponentialRampToValueAtTime(0.001, t + 0.06);
        osc.start(t);
        osc.stop(t + 0.07);
        break;
      case 'powerup':
        osc.type = 'sine';
        osc.frequency.setValueAtTime(523, t);
        osc.frequency.setValueAtTime(1046, t + 0.1);
        g.gain.setValueAtTime(0.2, t);
        g.gain.exponentialRampToValueAtTime(0.001, t + 0.15);
        osc.start(t); osc.stop(t + 0.16);
        break;
      case 'terminus':
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(55, t);
        osc.frequency.linearRampToValueAtTime(30, t + 0.5);
        g.gain.setValueAtTime(0.4, t);
        g.gain.exponentialRampToValueAtTime(0.001, t + 0.6);
        osc.start(t); osc.stop(t + 0.65);
        break;
      case 'gameover':
        osc.type = 'triangle';
        osc.frequency.setValueAtTime(330, t);
        osc.frequency.exponentialRampToValueAtTime(55, t + 0.8);
        g.gain.setValueAtTime(0.3, t);
        g.gain.exponentialRampToValueAtTime(0.001, t + 0.9);
        osc.start(t); osc.stop(t + 0.95);
        break;
    }
  }

    crossfadeTo(vol) {
      if (!audioCtx || !musicGain) return;
      musicTargetGain = vol;
      const t = audioCtx.currentTime;
      musicGain.gain.cancelScheduledValues(t);
      musicGain.gain.setValueAtTime(musicGain.gain.value, t);
      musicGain.gain.linearRampToValueAtTime(vol, t + 0.4);
    },

    applyDuck() {
      const tr = TRACKS[this.currentTrack] || TRACKS.patrol;
      const base = tr.volume;
      const duck = state === 'PAUSED' ? 'paused' : 'play';
      const vol = duck === 'paused' ? base * 0.35 : base;
      if (this.duckState === duck && Math.abs(musicTargetGain - vol) < 0.01) return;
      this.duckState = duck;
      this.crossfadeTo(vol);
    },

    sync() {
      const next = this.pickTrack();
      if (next !== this.currentTrack) this.setTrack(next);
      else this.applyDuck();
    },

    setTrack(id) {
      this.currentTrack = id;
      this.duckState = null;
      const tr = TRACKS[id] || TRACKS.patrol;
      this.crossfadeTo(state === 'PAUSED' ? tr.volume * 0.35 : tr.volume);
      this.restartLoops();
    },

    stopLoops() {
      musicLoopGen++;
      musicNodes.forEach(id => clearTimeout(id));
      musicNodes = [];
    },

    restartLoops() {
      this.stopLoops();
      if (!audioCtx || audioCtx.state !== 'running') return;
      const loopGen = musicLoopGen;
      const trackId = this.currentTrack || 'menu';
      const tr = TRACKS[trackId];
      const beat = 60 / tr.bpm;

      const scheduleKick = (start) => {
        const len = 32;
        for (let i = 0; i < len; i++) {
          const when = start + i * beat;
          const osc = audioCtx.createOscillator();
          const g = audioCtx.createGain();
          osc.type = 'sine';
          osc.frequency.setValueAtTime(trackId === 'terminus' ? 130 : 150, when);
          osc.frequency.exponentialRampToValueAtTime(40, when + 0.08);
          g.gain.setValueAtTime(tr.kickGain + musicIntensity * 0.18, when);
          g.gain.exponentialRampToValueAtTime(0.001, when + 0.12);
          osc.connect(g);
          g.connect(musicGain);
          osc.start(when);
          osc.stop(when + 0.15);
        }
        return start + len * beat;
      };

      const scheduleHat = (start) => {
        const len = 64;
        for (let i = 0; i < len; i++) {
          if (musicIntensity < tr.hatDensity * 0.15 && i % 2) continue;
          const when = start + i * (beat / 2);
          const buf = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.02, audioCtx.sampleRate);
          const d = buf.getChannelData(0);
          for (let j = 0; j < d.length; j++) d[j] = (Math.random() * 2 - 1) * Math.exp(-j / 80);
          const src = audioCtx.createBufferSource();
          src.buffer = buf;
          const g = audioCtx.createGain();
          g.gain.value = 0.06 + musicIntensity * tr.hatDensity * 0.14;
          const filt = audioCtx.createBiquadFilter();
          filt.type = 'highpass';
          filt.frequency.value = trackId === 'assault' ? 7500 : 6000;
          src.connect(filt);
          filt.connect(g);
          g.connect(musicGain);
          src.start(when);
        }
        return start + len * (beat / 2);
      };

      const scheduleBass = (start) => {
        let t = start;
        for (let cycle = 0; cycle < 4; cycle++) {
          for (const freq of tr.bassNotes) {
            if (musicIntensity < tr.bassGate) { t += beat; continue; }
            const osc = audioCtx.createOscillator();
            const g = audioCtx.createGain();
            osc.type = trackId === 'terminus' ? 'square' : 'sawtooth';
            const filt = audioCtx.createBiquadFilter();
            filt.type = 'lowpass';
            filt.frequency.value = 350 + musicIntensity * 900;
            osc.frequency.value = freq;
            g.gain.setValueAtTime(0.1 + musicIntensity * 0.12, t);
            g.gain.setValueAtTime(0.001, t + beat * 0.88);
            osc.connect(filt);
            filt.connect(g);
            g.connect(musicGain);
            osc.start(t);
            osc.stop(t + beat);
            t += beat;
          }
        }
        return t;
      };

      const scheduleArp = (start) => {
        let t = start;
        for (let i = 0; i < 32; i++) {
          if (musicIntensity < tr.arpGate) { t += beat / 2; continue; }
          const osc = audioCtx.createOscillator();
          const g = audioCtx.createGain();
          osc.type = trackId === 'menu' ? 'triangle' : 'square';
          osc.frequency.value = tr.arpScale[i % tr.arpScale.length]
            * (1 + Math.floor(i / 8) * (trackId === 'assault' ? 0.5 : 0.25));
          g.gain.setValueAtTime(trackId === 'terminus' ? 0.08 : 0.06, t);
          g.gain.exponentialRampToValueAtTime(0.001, t + 0.08);
          osc.connect(g);
          g.connect(musicGain);
          osc.start(t);
          osc.stop(t + 0.1);
          t += beat / 2;
        }
        return t;
      };

      const scheduleAlarm = (start) => {
        if (trackId !== 'terminus') return start;
        let t = start;
        for (let i = 0; i < 8; i++) {
          const osc = audioCtx.createOscillator();
          const g = audioCtx.createGain();
          osc.type = 'sawtooth';
          osc.frequency.setValueAtTime(880, t);
          osc.frequency.exponentialRampToValueAtTime(440, t + 0.12);
          g.gain.setValueAtTime(0.04, t);
          g.gain.exponentialRampToValueAtTime(0.001, t + 0.14);
          osc.connect(g);
          g.connect(musicGain);
          osc.start(t);
          osc.stop(t + 0.15);
          t += beat * 2;
        }
        return t;
      };

      const loop = () => {
        if (!audioCtx || loopGen !== musicLoopGen) return;
        const playStates = state === 'PLAYING' || state === 'PAUSED'
          || state === 'TITLE' || state === 'GAMEOVER';
        if (!playStates) {
          musicNodes.push(setTimeout(loop, 400));
          return;
        }
        const now = audioCtx.currentTime + 0.1;
        let end = now;
        end = scheduleKick(end);
        end = scheduleHat(end);
        end = scheduleBass(end);
        end = scheduleArp(end);
        end = scheduleAlarm(end);
        const delay = Math.max(400, (end - audioCtx.currentTime - 2) * 1000);
        musicNodes.push(setTimeout(loop, delay));
      };
      loop();
    },

    async start() {
      await resumeAudio();
      if (!audioCtx || audioCtx.state !== 'running') return;
      this.sync();
      if (!this.currentTrack) this.setTrack(this.pickTrack());
      else this.restartLoops();
    },

    stop() {
      this.stopLoops();
      this.currentTrack = null;
    }
  };

  async function startMusic() {
    await MusicDirector.start();
  }

  function stopMusicLoops() {
    MusicDirector.stop();
  }

  // ─── Game state ────────────────────────────────────────────────────────────
  let state = 'TITLE';
  let wave = 1;
  let score = 0;
  let combo = 0;
  let comboTimer = 0;
  let spawnTimer = 0;
  let waveTimer = 0;
  let gameTime = 0;
  let shake = 0;
  let terminusActive = false;
  let terminusSpawned = false;
  let fireCooldown = 0;
  let invuln = 0;
  let rapidTimer = 0;
  let shieldTimer = 0;

  const player = {
    x: ARENA.cx, y: ARENA.cy,
    hp: 100, maxHp: 100,
    angle: 0,
    speedMult: 1
  };

  const nodes = NODE_ANGLES.map((a, i) => ({
    name: NODE_NAMES[i],
    x: ARENA.cx + Math.cos(a) * NODE_DIST,
    y: ARENA.cy + Math.sin(a) * NODE_DIST,
    integrity: 100,
    corrupt: 0,
    pulse: 0,
    underAssault: 0,
    assaultWarned: false,
    hackSfxCd: 0,
    bandAlerted: 100
  }));

  // ─── High scores ───────────────────────────────────────────────────────────
  const HS_KEY = 'battleBoy_highscores_v1';

  function loadHighScores() {
    try {
      const raw = localStorage.getItem(HS_KEY);
      return raw ? JSON.parse(raw) : [];
    } catch { return []; }
  }

  function saveHighScore(s) {
    const list = loadHighScores();
    const entry = { score: s, date: new Date().toISOString().slice(0, 10), wave };
    list.push(entry);
    list.sort((a, b) => b.score - a.score);
    localStorage.setItem(HS_KEY, JSON.stringify(list.slice(0, 10)));
  }

  const leaderboardModal = document.getElementById('leaderboardModal');
  const leaderboardList = document.getElementById('leaderboardList');
  const leaderboardBtn = document.getElementById('leaderboardBtn');
  const leaderboardClose = document.getElementById('leaderboardClose');

  function renderLeaderboardList() {
    if (!leaderboardList) return;
    leaderboardList.innerHTML = '';
    const hs = loadHighScores();
    if (!hs.length) {
      const li = document.createElement('li');
      li.className = 'lb-empty';
      li.textContent = 'No scores yet — play to rank!';
      leaderboardList.appendChild(li);
      return;
    }
    hs.forEach((e, i) => {
      const li = document.createElement('li');
      const rank = document.createElement('span');
      rank.textContent = (i + 1) + '.';
      const pts = document.createElement('span');
      pts.textContent = e.score + '  W' + (e.wave || '?') + '  ' + e.date;
      li.append(rank, pts);
      leaderboardList.appendChild(li);
    });
  }

  function openLeaderboard(e) {
    if (e) { e.stopPropagation(); e.preventDefault(); }
    renderLeaderboardList();
    leaderboardModal?.classList.add('open');
  }

  function closeLeaderboard(e) {
    if (e) { e.stopPropagation(); e.preventDefault(); }
    leaderboardModal?.classList.remove('open');
  }

  if (leaderboardBtn) {
    leaderboardBtn.addEventListener('click', openLeaderboard, true);
    leaderboardBtn.addEventListener('touchend', openLeaderboard, { passive: false, capture: true });
    leaderboardBtn.addEventListener('pointerdown', (e) => e.stopPropagation());
  }
  if (leaderboardClose) {
    leaderboardClose.addEventListener('click', closeLeaderboard, true);
    leaderboardClose.addEventListener('touchend', closeLeaderboard, { passive: false, capture: true });
  }
  if (leaderboardModal) {
    leaderboardModal.addEventListener('click', (e) => {
      if (e.target === leaderboardModal) closeLeaderboard(e);
    });
  }

  // ─── Helpers ───────────────────────────────────────────────────────────────
  function dist(ax, ay, bx, by) {
    return Math.hypot(bx - ax, by - ay);
  }

  function clampArena(x, y, r) {
    const dx = x - ARENA.cx, dy = y - ARENA.cy;
    const d = Math.hypot(dx, dy);
    const maxD = ARENA.r - r;
    if (d > maxD) {
      const s = maxD / d;
      return { x: ARENA.cx + dx * s, y: ARENA.cy + dy * s };
    }
    return { x, y };
  }

  function spawnParticles(x, y, color, n, speed) {
    for (let i = 0; i < n; i++) {
      const a = Math.random() * Math.PI * 2;
      const sp = speed * (0.5 + Math.random());
      particlePool.spawn(p => {
        p.x = x; p.y = y;
        p.vx = Math.cos(a) * sp;
        p.vy = Math.sin(a) * sp;
        p.life = p.maxLife = 0.3 + Math.random() * 0.4;
        p.size = 2 + Math.random() * 3;
        p.color = color;
      });
    }
  }

  function totalIntegrity() {
    return nodes.reduce((s, n) => s + n.integrity, 0);
  }

  function zeroNodes() {
    return nodes.filter(n => n.integrity <= 0).length;
  }

  function checkTerminusProtocol() {
    const ti = totalIntegrity();
    const z = zeroNodes();
    return z >= TERMINUS_NODES_ZERO || ti <= TERMINUS_INTEGRITY;
  }

  // ─── Spawning ──────────────────────────────────────────────────────────────
  function spawnEnemyAtEdge(type) {
    const a = Math.random() * Math.PI * 2;
    const x = ARENA.cx + Math.cos(a) * (ARENA.r + 20);
    const y = ARENA.cy + Math.sin(a) * (ARENA.r + 20);
    spawnEnemy(type, x, y);
  }

  function spawnEnemy(type, x, y) {
    const waveMult = 1 + (wave - 1) * 0.08;
    enemyPool.spawn(e => {
      e.x = x; e.y = y;
      e.type = type;
      e.flash = 0;
      e.shootCd = 1 + Math.random();
      e.corruptCd = 2 + Math.random() * 2;
      switch (type) {
        case 'grunt':
          e.hp = e.maxHp = Math.ceil(2 * waveMult);
          e.r = 12;
          break;
        case 'hacker':
          e.hp = e.maxHp = Math.ceil(3 * waveMult);
          e.r = 14;
          break;
        case 'shooter':
          e.hp = e.maxHp = Math.ceil(4 * waveMult);
          e.r = 13;
          break;
        case 'swarmer':
          e.hp = e.maxHp = 1;
          e.r = 8;
          break;
        case 'terminus':
          e.hp = e.maxHp = Math.ceil(40 * waveMult);
          e.r = 22;
          break;
      }
      e.vx = e.vy = 0;
    });
  }

  function pickEnemyType() {
    const r = Math.random();
    if (wave >= 6 && r < 0.22) return 'swarmer';
    if (wave >= 4 && r < 0.35) return 'shooter';
    if (r < 0.25) return 'hacker';
    return 'grunt';
  }

  function spawnWaveBatch() {
    const count = Math.min(3 + Math.floor(wave * 0.8), 12);
    for (let i = 0; i < count; i++) {
      if (enemyPool.active.length >= MAX_ENEMIES - 5) break;
      spawnEnemyAtEdge(pickEnemyType());
    }
    if (wave >= 3) spawnEnemyAtEdge('hacker');
  }

  function spawnPowerup(x, y) {
    if (powerupPool.active.length >= MAX_POWERUPS) return;
    const types = ['health', 'rapid', 'shield', 'node'];
    const type = types[Math.floor(Math.random() * types.length)];
    powerupPool.spawn(p => {
      p.x = x; p.y = y;
      p.type = type;
      p.life = 12;
      p.pulse = 0;
    });
  }

  // ─── Combat ────────────────────────────────────────────────────────────────
  function fireBullet(x, y, angle, friendly, dmg, color, speed) {
    if (friendly && bulletPool.active.filter(b => b.friendly).length > 80) return;
    bulletPool.spawn(b => {
      b.x = x; b.y = y;
      b.vx = Math.cos(angle) * speed;
      b.vy = Math.sin(angle) * speed;
      b.life = friendly ? 1.2 : 2;
      b.dmg = dmg;
      b.friendly = friendly;
      b.color = color;
    });
    if (friendly) playSfx('shoot');
  }

  function damageEnemy(e, dmg) {
    e.hp -= dmg;
    e.flash = 0.1;
    if (e.hp <= 0) killEnemy(e);
    else playSfx('hit');
  }

  function killEnemy(e) {
    const mult = 1 + Math.floor(combo / 5) * 0.1;
    const pts = { grunt: 100, hacker: 150, shooter: 200, swarmer: 50, terminus: 2000 }[e.type] || 100;
    score += Math.floor(pts * mult);
    combo++;
    comboTimer = 2.5;
    spawnParticles(e.x, e.y, COLORS.magenta, 12, 180);
    playSfx('explode');
    if (Math.random() < 0.12) spawnPowerup(e.x, e.y);
    enemyPool.release(e);
    musicIntensity = Math.min(1, musicIntensity + 0.02);
  }

  function getNodeStatus(n) {
    if (n.integrity <= 0) return 'offline';
    if (n.corrupt > 0.12 || n.underAssault > 0) return 'assault';
    if (n.integrity < 75) return 'infected';
    return 'online';
  }

  function alertNodeIntegrityBand(node, prevIntegrity) {
    const bands = [75, 50, 25];
    for (const b of bands) {
      if (node.bandAlerted > b && node.integrity < b) {
        node.bandAlerted = b;
        playSfx('nodeInfected');
        spawnParticles(node.x, node.y, NODE_ASSAULT, 14, 150);
        return;
      }
    }
    if (prevIntegrity > 0 && node.integrity <= 0) {
      node.bandAlerted = 0;
      playSfx('nodeFallen');
      spawnParticles(node.x, node.y, NODE_INFECT, 22, 200);
    }
  }

  function damageNode(node, amt) {
    const prev = node.integrity;
    node.integrity = Math.max(0, node.integrity - amt);
    node.pulse = 1;
    node.corrupt = 1.2;
    if (node.integrity <= 0 && prev > 0) {
      alertNodeIntegrityBand(node, prev);
    } else {
      playSfx('node');
      alertNodeIntegrityBand(node, prev);
      spawnParticles(node.x, node.y, NODE_ASSAULT, 10, 130);
    }
  }

  function damagePlayer(amt) {
    if (invuln > 0 || shieldTimer > 0) return;
    player.hp -= amt;
    invuln = 0.4;
    shake = 8;
    playSfx('hit');
    combo = 0;
    if (player.hp <= 0) endGame();
  }

  // ─── Game flow ─────────────────────────────────────────────────────────────
  function resetGame() {
    player.x = ARENA.cx;
    player.y = ARENA.cy;
    player.hp = player.maxHp = 100;
    player.angle = 0;
    player.speedMult = 1;
    wave = 1;
    score = 0;
    combo = 0;
    comboTimer = 0;
    spawnTimer = 0;
    waveTimer = 0;
    gameTime = 0;
    shake = 0;
    terminusActive = false;
    terminusSpawned = false;
    fireCooldown = 0;
    invuln = 0;
    rapidTimer = 0;
    shieldTimer = 0;
    musicIntensity = 0.1;
    nodes.forEach(n => {
      n.integrity = 100;
      n.corrupt = 0;
      n.pulse = 0;
      n.underAssault = 0;
      n.assaultWarned = false;
      n.hackSfxCd = 0;
      n.bandAlerted = 100;
    });
    bulletPool.active.slice().forEach(b => bulletPool.release(b));
    enemyPool.active.slice().forEach(e => enemyPool.release(e));
    particlePool.active.slice().forEach(p => particlePool.release(p));
    powerupPool.active.slice().forEach(p => powerupPool.release(p));
  }

  let startLock = false;

  function launchRun() {
    if (startLock) return;
    if (state !== 'TITLE' && state !== 'GAMEOVER') return;
    startLock = true;
    try {
      if (state === 'GAMEOVER') stopMusicLoops();
      closeLeaderboard();
      resetGame();
      state = 'PLAYING';
      document.body.classList.remove('title-cursor', 'gameover-tap');
      document.body.classList.add('playing-ui');
      updatePlayLayoutClasses();
      spawnWaveBatch();
      updateIosInstallBanner();
      if (isTouchDevice && !isIOSSafariBrowser) enterGameFullscreen();
      resumeAudio().then(() => startMusic());
    } finally {
      startLock = false;
    }
  }

  function startGame() {
    launchRun();
  }

  function endGame() {
    state = 'GAMEOVER';
    document.body.classList.remove('playing-ui');
    updatePlayLayoutClasses();
    exitGameFullscreen();
    playSfx('gameover');
    saveHighScore(score);
    stopMusicLoops();
    resumeAudio().then(() => MusicDirector.start());
  }

  // ─── Update ────────────────────────────────────────────────────────────────
  function update(dt) {
    if (state !== 'PLAYING') return;
    gameTime += dt;
    pollGamepad();

    if (comboTimer > 0) {
      comboTimer -= dt;
      if (comboTimer <= 0) combo = 0;
    }
    if (invuln > 0) invuln -= dt;
    if (rapidTimer > 0) rapidTimer -= dt;
    if (shieldTimer > 0) shieldTimer -= dt;
    if (shake > 0) shake = Math.max(0, shake - dt * 30);

    // Terminus Protocol
    terminusActive = checkTerminusProtocol();
    if (terminusActive && !terminusSpawned) {
      terminusSpawned = true;
      playSfx('terminus');
      MusicDirector.sync();
      const a = Math.random() * Math.PI * 2;
      spawnEnemy('terminus',
        ARENA.cx + Math.cos(a) * (ARENA.r * 0.5),
        ARENA.cy + Math.sin(a) * (ARENA.r * 0.5));
      shake = 15;
    }

    // Player movement
    const { mx, my } = getMoveVector();
    const spd = PLAYER_SPEED * player.speedMult * (1 + (wave - 1) * 0.02);
    player.x += mx * spd * dt;
    player.y += my * spd * dt;
    const clamped = clampArena(player.x, player.y, PLAYER_RADIUS);
    player.x = clamped.x;
    player.y = clamped.y;
    player.angle = getAimAngle(player.x, player.y);

    // Firing
    const rate = rapidTimer > 0 ? FIRE_RATE * 0.45 : FIRE_RATE;
    if (wantsFire()) {
      fireCooldown -= dt;
      if (fireCooldown <= 0) {
        fireCooldown = rate;
        fireBullet(
          player.x + Math.cos(player.angle) * 18,
          player.y + Math.sin(player.angle) * 18,
          player.angle, true, 1 + (rapidTimer > 0 ? 0.5 : 0),
          rapidTimer > 0 ? COLORS.lime : COLORS.cyan,
          BULLET_SPEED
        );
      }
    } else {
      fireCooldown = Math.min(fireCooldown, rate * 0.5);
    }

    // Wave spawning
    spawnTimer -= dt;
    const spawnInterval = Math.max(0.35, 2.2 - wave * 0.12);
    if (spawnTimer <= 0) {
      spawnTimer = spawnInterval;
      if (enemyPool.active.length < 15 + wave * 2) {
        spawnEnemyAtEdge(pickEnemyType());
        if (wave >= 5 && Math.random() < 0.3) spawnEnemyAtEdge('swarmer');
      }
    }
    waveTimer += dt;
    if (waveTimer > 25) {
      wave++;
      waveTimer = 0;
      spawnWaveBatch();
      musicIntensity = Math.min(1, musicIntensity + 0.08);
      MusicDirector.sync();
    }

    musicIntensity = Math.min(1, 0.15 + wave * 0.06 + (400 - totalIntegrity()) / 500);
    MusicDirector.sync();

    // Bullets
    for (let i = bulletPool.active.length - 1; i >= 0; i--) {
      const b = bulletPool.active[i];
      b.x += b.vx * dt;
      b.y += b.vy * dt;
      b.life -= dt;
      if (b.life <= 0 || dist(b.x, b.y, ARENA.cx, ARENA.cy) > ARENA.r + 40) {
        bulletPool.release(b);
        continue;
      }
      if (b.friendly) {
        for (const e of enemyPool.active) {
          if (dist(b.x, b.y, e.x, e.y) < e.r + 4) {
            damageEnemy(e, b.dmg);
            bulletPool.release(b);
            break;
          }
        }
      } else {
        if (dist(b.x, b.y, player.x, player.y) < PLAYER_RADIUS + 4) {
          damagePlayer(8);
          bulletPool.release(b);
        }
        for (const n of nodes) {
          if (n.integrity > 0 && dist(b.x, b.y, n.x, n.y) < NODE_RADIUS) {
            damageNode(n, 5);
            bulletPool.release(b);
            break;
          }
        }
      }
    }

    // Enemies
    const speedBase = 90 + wave * 8;
    for (const e of enemyPool.active) {
      if (e.flash > 0) e.flash -= dt;

      if (e.type === 'grunt' || e.type === 'terminus') {
        const tx = e.type === 'terminus' && terminusActive ? ARENA.cx : player.x;
        const ty = e.type === 'terminus' && terminusActive ? ARENA.cy : player.y;
        const ang = Math.atan2(ty - e.y, tx - e.x);
        const sp = (e.type === 'terminus' ? 70 : speedBase) * dt;
        e.x += Math.cos(ang) * sp;
        e.y += Math.sin(ang) * sp;
        if (dist(e.x, e.y, player.x, player.y) < e.r + PLAYER_RADIUS) {
          damagePlayer(e.type === 'terminus' ? 25 : 12);
        }
      }

      if (e.type === 'hacker') {
        let target = null, best = 1e9;
        for (const n of nodes) {
          if (n.integrity <= 0) continue;
          const d = dist(e.x, e.y, n.x, n.y);
          if (d < best) { best = d; target = n; }
        }
        if (target) {
          const ang = Math.atan2(target.y - e.y, target.x - e.x);
          e.x += Math.cos(ang) * speedBase * 0.85 * dt;
          e.y += Math.sin(ang) * speedBase * 0.85 * dt;
          e.corruptCd -= dt;
          const inRange = dist(e.x, e.y, target.x, target.y) < NODE_RADIUS + e.r + 4;
          if (inRange) {
            target.underAssault = 0.5;
            if (!target.assaultWarned) {
              target.assaultWarned = true;
              playSfx('nodeAlert');
            }
            target.hackSfxCd -= dt;
            if (target.hackSfxCd <= 0) {
              target.hackSfxCd = 0.45;
              playSfx('nodeHack');
            }
            if (e.corruptCd <= 0) {
              e.corruptCd = 1.2;
              damageNode(target, 4 + wave * 0.3);
            }
          }
        }
        if (dist(e.x, e.y, player.x, player.y) < e.r + PLAYER_RADIUS) damagePlayer(8);
      }

      if (e.type === 'shooter') {
        const d = dist(e.x, e.y, player.x, player.y);
        if (d > 180) {
          const ang = Math.atan2(player.y - e.y, player.x - e.x);
          e.x += Math.cos(ang) * speedBase * 0.7 * dt;
          e.y += Math.sin(ang) * speedBase * 0.7 * dt;
        }
        e.shootCd -= dt;
        if (e.shootCd <= 0 && d < 400) {
          e.shootCd = 1.4 - wave * 0.05;
          const ang = Math.atan2(player.y - e.y, player.x - e.x);
          fireBullet(e.x, e.y, ang, false, 6, COLORS.orange, 320);
        }
        if (d < e.r + PLAYER_RADIUS) damagePlayer(10);
      }

      if (e.type === 'swarmer') {
        const ang = Math.atan2(player.y - e.y, player.x - e.x);
        const sp = (speedBase * 1.4) * dt;
        e.x += Math.cos(ang) * sp;
        e.y += Math.sin(ang) * sp;
        if (dist(e.x, e.y, player.x, player.y) < e.r + PLAYER_RADIUS) {
          damagePlayer(6);
          e.hp = 0;
          killEnemy(e);
        }
      }

      const c = clampArena(e.x, e.y, e.r);
      e.x = c.x; e.y = c.y;
    }

    // Nodes passive regen (slow)
    nodes.forEach(n => {
      if (n.pulse > 0) n.pulse -= dt * 2;
      if (n.corrupt > 0) n.corrupt -= dt * 0.65;
      if (n.underAssault > 0) {
        n.underAssault -= dt;
        if (Math.random() < 0.35) {
          spawnParticles(n.x, n.y, NODE_ASSAULT, 2, 80);
        }
      } else {
        n.assaultWarned = false;
      }
      if (n.integrity > 0 && n.integrity < 100 && n.underAssault <= 0 && enemyPool.active.length < 8) {
        n.integrity = Math.min(100, n.integrity + dt * 2);
        if (n.integrity >= 75 && n.bandAlerted < 75) n.bandAlerted = 100;
      }
    });

    // Power-ups
    for (let i = powerupPool.active.length - 1; i >= 0; i--) {
      const p = powerupPool.active[i];
      p.life -= dt;
      p.pulse += dt * 5;
      if (p.life <= 0) { powerupPool.release(p); continue; }
      if (dist(p.x, p.y, player.x, player.y) < PLAYER_RADIUS + 16) {
        playSfx('powerup');
        switch (p.type) {
          case 'health': player.hp = Math.min(player.maxHp, player.hp + 30); break;
          case 'rapid': rapidTimer = 8; break;
          case 'shield': shieldTimer = 6; break;
          case 'node':
            const weak = nodes.reduce((a, b) => a.integrity < b.integrity ? a : b);
            weak.integrity = Math.min(100, weak.integrity + 25);
            break;
        }
        score += 50;
        powerupPool.release(p);
      }
    }

    // Particles
    for (let i = particlePool.active.length - 1; i >= 0; i--) {
      const p = particlePool.active[i];
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.vx *= 0.96;
      p.vy *= 0.96;
      p.life -= dt;
      if (p.life <= 0) particlePool.release(p);
    }
  }

  // ─── Rendering helpers (TripTronic neon) ───────────────────────────────────
  function neonStroke(color, width, blur) {
    ctx.strokeStyle = color;
    ctx.lineWidth = width;
    ctx.shadowColor = color;
    ctx.shadowBlur = blur;
  }

  function neonFill(color, blur) {
    ctx.fillStyle = color;
    ctx.shadowColor = color;
    ctx.shadowBlur = blur;
  }

  function resetShadow() {
    ctx.shadowBlur = 0;
    ctx.shadowColor = 'transparent';
  }

  function drawGrid() {
    ctx.save();
    neonStroke('#1a2a3a', 1, 0);
    const step = 40;
    for (let x = 0; x <= W; x += step) {
      ctx.beginPath();
      ctx.moveTo(x, 0);
      ctx.lineTo(x, H);
      ctx.stroke();
    }
    for (let y = 0; y <= H; y += step) {
      ctx.beginPath();
      ctx.moveTo(0, y);
      ctx.lineTo(W, y);
      ctx.stroke();
    }
    resetShadow();
    // Arena ring
    neonStroke(COLORS.cyan, 2, 12);
    ctx.beginPath();
    ctx.arc(ARENA.cx, ARENA.cy, ARENA.r, 0, Math.PI * 2);
    ctx.stroke();
    neonStroke(COLORS.magenta, 1, 6);
    ctx.beginPath();
    ctx.arc(ARENA.cx, ARENA.cy, ARENA.r - 8, 0, Math.PI * 2);
    ctx.stroke();
    resetShadow();
    ctx.restore();
  }

  function drawNodeHex(r, strokeCol, lineW, glow) {
    neonStroke(strokeCol, lineW, glow);
    ctx.beginPath();
    for (let i = 0; i < 6; i++) {
      const a = (i / 6) * Math.PI * 2 - Math.PI / 2;
      const px = Math.cos(a) * r;
      const py = Math.sin(a) * r;
      if (i === 0) ctx.moveTo(px, py);
      else ctx.lineTo(px, py);
    }
    ctx.closePath();
    ctx.stroke();
  }

  function drawNode(n) {
    const theme = NODE_THEME[n.name] || NODE_THEME.ALPHA;
    const pct = n.integrity / 100;
    const status = getNodeStatus(n);
    const flicker = status === 'assault' ? (Math.sin(gameTime * 22) > 0 ? 1 : 0.55) : 1;
    const pulse = 1 + Math.sin(gameTime * 4 + n.pulse * 8) * 0.1 * n.pulse
      + (status === 'assault' ? Math.sin(gameTime * 14) * 0.06 : 0);

    let strokeCol = theme.healthy;
    let coreCol = theme.glow;
    let arcCol = COLORS.lime;
    let statusText = '';
    let statusCol = theme.label;

    if (status === 'offline') {
      strokeCol = '#442233';
      coreCol = '#220818';
      arcCol = COLORS.red;
      statusText = 'OFFLINE';
      statusCol = COLORS.red;
    } else if (status === 'assault') {
      strokeCol = NODE_ASSAULT;
      coreCol = NODE_INFECT;
      arcCol = NODE_INFECT;
      statusText = 'UNDER ATTACK';
      statusCol = NODE_INFECT;
    } else if (status === 'infected') {
      const mix = 1 - pct;
      strokeCol = mix > 0.5 ? NODE_INFECT : NODE_ASSAULT;
      coreCol = NODE_INFECT;
      arcCol = COLORS.orange;
      statusText = 'INFECTED';
      statusCol = NODE_INFECT;
    }

    ctx.save();
    ctx.translate(n.x, n.y);
    ctx.scale(pulse, pulse);

    if (status === 'offline') {
      ctx.globalAlpha = 0.55 + Math.sin(gameTime * 3) * 0.15;
    }

    drawNodeHex(NODE_RADIUS, strokeCol, status === 'assault' ? 3 : 2, (14 + n.corrupt * 10) * pct * flicker);

    if (status === 'assault' || status === 'infected') {
      const spin = gameTime * 2.5;
      neonStroke(NODE_ASSAULT, 2, 18);
      ctx.setLineDash([6, 8]);
      ctx.lineDashOffset = -gameTime * 40;
      ctx.beginPath();
      ctx.arc(0, 0, NODE_RADIUS + 10, spin, spin + Math.PI * 1.2);
      ctx.stroke();
      ctx.setLineDash([]);
      resetShadow();
    }

    if (status !== 'offline') {
      neonStroke(arcCol, 3, 10);
      ctx.beginPath();
      ctx.arc(0, 0, NODE_RADIUS - 6, -Math.PI / 2, -Math.PI / 2 + Math.PI * 2 * pct);
      ctx.stroke();
    }

    if (status === 'offline') {
      neonStroke(COLORS.red, 2, 14);
      ctx.beginPath();
      ctx.moveTo(-10, -10);
      ctx.lineTo(10, 10);
      ctx.moveTo(10, -10);
      ctx.lineTo(-10, 10);
      ctx.stroke();
    } else if (status === 'assault') {
      neonFill(NODE_INFECT, 14);
      ctx.beginPath();
      for (let i = 0; i < 4; i++) {
        const a = (i / 4) * Math.PI * 2 + gameTime * 3;
        const px = Math.cos(a) * 9;
        const py = Math.sin(a) * 9;
        if (i === 0) ctx.moveTo(px, py);
        else ctx.lineTo(px, py);
      }
      ctx.closePath();
      ctx.fill();
    } else {
      neonFill(coreCol, 12 * flicker);
      ctx.beginPath();
      ctx.arc(0, 0, 8 * Math.max(0.35, pct), 0, Math.PI * 2);
      ctx.fill();
    }

    if (n.corrupt > 0 && status !== 'offline') {
      neonStroke(NODE_INFECT, 2, 22);
      ctx.beginPath();
      ctx.arc(0, 0, NODE_RADIUS + 8, 0, Math.PI * 2 * Math.min(1, n.corrupt));
      ctx.stroke();
    }

    resetShadow();
    ctx.globalAlpha = 1;
    ctx.font = 'bold 11px Courier New';
    ctx.textAlign = 'center';
    ctx.fillStyle = statusCol;
    ctx.fillText(n.name, 0, NODE_RADIUS + 16);
    if (statusText) {
      ctx.font = '9px Courier New';
      ctx.fillStyle = NODE_INFECT;
      ctx.fillText(statusText, 0, NODE_RADIUS + 28);
    }
    ctx.font = 'bold 12px Courier New';
    ctx.fillStyle = status === 'offline' ? COLORS.red : COLORS.white;
    ctx.fillText(status === 'offline' ? '0%' : Math.ceil(n.integrity) + '%', 0, -NODE_RADIUS - 10);
    ctx.restore();
  }

  function drawEnemy(e) {
    const flash = e.flash > 0;
    let col = COLORS.magenta;
    if (e.type === 'hacker') col = COLORS.lime;
    if (e.type === 'shooter') col = COLORS.orange;
    if (e.type === 'swarmer') col = COLORS.yellow;
    if (e.type === 'terminus') col = COLORS.red;
    if (flash) col = COLORS.white;

    ctx.save();
    ctx.translate(e.x, e.y);

    neonStroke(col, 2, e.type === 'terminus' ? 24 : 10);
    ctx.beginPath();
    if (e.type === 'hacker') {
      ctx.moveTo(0, -e.r);
      ctx.lineTo(e.r, 0);
      ctx.lineTo(0, e.r);
      ctx.lineTo(-e.r, 0);
      ctx.closePath();
    } else if (e.type === 'shooter') {
      ctx.rect(-e.r, -e.r, e.r * 2, e.r * 2);
    } else if (e.type === 'terminus') {
      for (let i = 0; i < 8; i++) {
        const a = (i / 8) * Math.PI * 2;
        const r2 = i % 2 ? e.r * 0.7 : e.r;
        const px = Math.cos(a) * r2, py = Math.sin(a) * r2;
        if (i === 0) ctx.moveTo(px, py);
        else ctx.lineTo(px, py);
      }
      ctx.closePath();
    } else {
      ctx.arc(0, 0, e.r, 0, Math.PI * 2);
    }
    ctx.stroke();

    if (e.maxHp > 1) {
      resetShadow();
      ctx.fillStyle = '#223';
      ctx.fillRect(-e.r, e.r + 4, e.r * 2, 3);
      ctx.fillStyle = col;
      ctx.fillRect(-e.r, e.r + 4, e.r * 2 * (e.hp / e.maxHp), 3);
    }
    resetShadow();
    ctx.restore();
  }

  function drawPlayer() {
    ctx.save();
    ctx.translate(player.x, player.y);
    ctx.rotate(player.angle);

    const col = invuln > 0 && Math.floor(gameTime * 20) % 2 ? COLORS.white : COLORS.cyan;
    if (shieldTimer > 0) {
      neonStroke(COLORS.lime, 2, 18);
      ctx.beginPath();
      ctx.arc(0, 0, PLAYER_RADIUS + 8 + Math.sin(gameTime * 8) * 2, 0, Math.PI * 2);
      ctx.stroke();
    }

    neonFill(col, 14);
    neonStroke(col, 2, 12);
    // Ship body — vector triangle
    ctx.beginPath();
    ctx.moveTo(16, 0);
    ctx.lineTo(-10, -10);
    ctx.lineTo(-6, 0);
    ctx.lineTo(-10, 10);
    ctx.closePath();
    ctx.fill();
    ctx.stroke();

    neonStroke(rapidTimer > 0 ? COLORS.lime : COLORS.magenta, 1, 6);
    ctx.beginPath();
    ctx.moveTo(-6, 0);
    ctx.lineTo(-14, 0);
    ctx.stroke();

    resetShadow();
    ctx.restore();
  }

  function drawBullets() {
    for (const b of bulletPool.active) {
      neonFill(b.color, 8);
      ctx.beginPath();
      ctx.arc(b.x, b.y, b.friendly ? 3 : 4, 0, Math.PI * 2);
      ctx.fill();
      neonStroke(b.color, 1, 6);
      ctx.beginPath();
      ctx.moveTo(b.x, b.y);
      ctx.lineTo(b.x - b.vx * 0.03, b.y - b.vy * 0.03);
      ctx.stroke();
    }
    resetShadow();
  }

  function drawParticles() {
    for (const p of particlePool.active) {
      const a = p.life / p.maxLife;
      ctx.globalAlpha = a;
      neonFill(p.color, 6);
      ctx.fillRect(p.x - p.size / 2, p.y - p.size / 2, p.size, p.size);
    }
    ctx.globalAlpha = 1;
    resetShadow();
  }

  function drawPowerups() {
    const icons = { health: '+', rapid: '»', shield: '◯', node: '◇' };
    const cols = { health: COLORS.lime, rapid: COLORS.cyan, shield: COLORS.yellow, node: COLORS.magenta };
    for (const p of powerupPool.active) {
      const s = 1 + Math.sin(p.pulse) * 0.15;
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.scale(s, s);
      neonStroke(cols[p.type], 2, 12);
      ctx.beginPath();
      ctx.arc(0, 0, 12, 0, Math.PI * 2);
      ctx.stroke();
      ctx.fillStyle = cols[p.type];
      ctx.font = 'bold 14px Courier New';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(icons[p.type], 0, 1);
      ctx.restore();
    }
    resetShadow();
  }

  function drawLogo(cx, cy, scale) {
    ctx.save();
    ctx.translate(cx, cy);
    ctx.scale(scale, scale);
    const title = 'BATTLE';
    const sub = 'BOY';
    ctx.font = 'bold 72px Courier New';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';

    // Layered glow strokes
    for (let i = 3; i >= 0; i--) {
      neonStroke(i % 2 ? COLORS.magenta : COLORS.cyan, 4 - i, 8 + i * 6);
      ctx.strokeText(title, 0, -30);
      neonStroke(i % 2 ? COLORS.cyan : COLORS.lime, 3, 6 + i * 4);
      ctx.strokeText(sub, 0, 40);
    }
    neonFill(COLORS.white, 4);
    ctx.fillText(title, 0, -30);
    neonFill(COLORS.yellow, 4);
    ctx.fillText(sub, 0, 40);

    // Decorative lines
    neonStroke(COLORS.cyan, 1, 8);
    ctx.beginPath();
    ctx.moveTo(-180, 70);
    ctx.lineTo(180, 70);
    ctx.stroke();
    resetShadow();
    ctx.restore();
  }

  function drawHUD() {
    ctx.save();
    resetShadow();
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.fillRect(0, 0, W, 48);
    ctx.fillRect(0, H - 36, W, 36);

    ctx.font = '16px Courier New';
    ctx.fillStyle = COLORS.cyan;
    ctx.textAlign = 'left';
    ctx.fillText('SCORE ' + score, 16, 28);
    ctx.fillText('WAVE ' + wave, 200, 28);
    if (combo > 1) {
      ctx.fillStyle = COLORS.yellow;
      ctx.fillText('COMBO x' + combo, 320, 28);
    }

    // HP bar
    ctx.fillStyle = COLORS.dim;
    ctx.fillRect(500, 14, 200, 20);
    ctx.fillStyle = player.hp > 30 ? COLORS.lime : COLORS.red;
    ctx.fillRect(500, 14, 200 * (player.hp / player.maxHp), 20);
    ctx.strokeStyle = COLORS.cyan;
    ctx.strokeRect(500, 14, 200, 20);
    ctx.fillStyle = COLORS.white;
    ctx.fillText('HULL', 710, 28);

    // Node integrity summary
    ctx.textAlign = 'right';
    const assaultN = nodes.filter(n => getNodeStatus(n) === 'assault').length;
    const infectN = nodes.filter(n => getNodeStatus(n) === 'infected').length;
    const offN = nodes.filter(n => getNodeStatus(n) === 'offline').length;
    if (assaultN || infectN || offN) {
      ctx.fillStyle = NODE_INFECT;
      ctx.font = 'bold 12px Courier New';
      let warn = '';
      if (assaultN) warn += assaultN + ' ATTACKED ';
      if (infectN) warn += infectN + ' INFECTED ';
      if (offN) warn += offN + ' OFFLINE';
      ctx.fillText('⚠ ' + warn.trim(), W - 16, 28);
    } else {
      ctx.fillStyle = COLORS.magenta;
      ctx.font = '16px Courier New';
      ctx.fillText('NODES ' + Math.ceil(totalIntegrity()) + '/400', W - 16, 28);
    }

    if (terminusActive) {
      ctx.textAlign = 'center';
      ctx.fillStyle = COLORS.red;
      ctx.font = 'bold 14px Courier New';
      const blink = Math.sin(gameTime * 10) > 0;
      if (blink) ctx.fillText('⚠ TERMINUS PROTOCOL ACTIVE ⚠', W / 2, 28);
    }

    // Power-up indicators
    ctx.textAlign = 'left';
    ctx.font = '13px Courier New';
    let y = H - 14;
    if (rapidTimer > 0) { ctx.fillStyle = COLORS.lime; ctx.fillText('RAPID ' + rapidTimer.toFixed(1) + 's', 16, y); }
    if (shieldTimer > 0) { ctx.fillStyle = COLORS.yellow; ctx.fillText('SHIELD ' + shieldTimer.toFixed(1) + 's', 120, y); }

    ctx.fillStyle = COLORS.dim;
    ctx.textAlign = 'center';
    if (!isPortraitPlay()) {
      const hint = isIOSSafariBrowser
        ? 'Sticks MOVE/FIRE · PAUSE below score'
        : isTouchDevice
          ? 'Sticks MOVE/FIRE · PAUSE below score'
          : 'WASD+mouse · PAUSE below score · P key';
      ctx.fillText(hint, W / 2, H - 14);
    }
    ctx.restore();
  }

  function drawTitle() {
    ctx.fillStyle = COLORS.bg;
    ctx.fillRect(0, 0, W, H);
    drawGrid();

    // Animated background vectors
    for (let i = 0; i < 12; i++) {
      const a = gameTime * 0.3 + i * 0.52;
      const r = 120 + i * 18;
      neonStroke(i % 3 === 0 ? COLORS.cyan : i % 3 === 1 ? COLORS.magenta : COLORS.lime, 1, 6);
      ctx.beginPath();
      ctx.arc(ARENA.cx + Math.cos(a) * r * 0.5, ARENA.cy + Math.sin(a) * r * 0.5, 20 + i * 3, 0, Math.PI * 2);
      ctx.stroke();
    }
    resetShadow();

    drawLogo(W / 2, H / 2 - 60, 1);

    ctx.font = '18px Courier New';
    ctx.fillStyle = COLORS.white;
    ctx.textAlign = 'center';
    const pulse = Math.sin(gameTime * 3) * 0.3 + 0.7;
    ctx.globalAlpha = pulse;
    const startMsg = isTouchDevice
      ? 'TAP START BELOW'
      : 'PRESS START · ENTER · OR CLICK';
    ctx.fillText(startMsg, W / 2, H / 2 + 120);
    ctx.globalAlpha = 1;

    ctx.font = '14px Courier New';
    ctx.fillStyle = COLORS.dim;
    ctx.fillText('Defend four Function Nodes · Twin-stick arena combat · TripTronic vectors', W / 2, H / 2 + 155);
    if (isStandalone) {
      ctx.fillStyle = COLORS.lime;
      ctx.fillText('Home Screen mode — full display, no Safari bars', W / 2, H / 2 + 178);
    } else if (isIOSSafariBrowser) {
      ctx.fillStyle = COLORS.yellow;
      ctx.fillText('iPhone: Share → Add to Home Screen to hide Safari UI', W / 2, H / 2 + 178);
    } else if (isTouchDevice) {
      ctx.fillStyle = COLORS.cyan;
      ctx.fillText('Mobile: twin sticks · FULLSCREEN button', W / 2, H / 2 + 178);
    } else {
      ctx.fillStyle = COLORS.dim;
      ctx.fillText('Press F during play for fullscreen', W / 2, H / 2 + 178);
    }

    ctx.fillStyle = COLORS.yellow;
    ctx.font = '14px Courier New';
    ctx.fillText('LEADERBOARD button — local top 10', W / 2, H / 2 + 200);
  }

  function drawGameOver() {
    ctx.fillStyle = 'rgba(8,8,16,0.75)';
    ctx.fillRect(0, 0, W, H);

    drawLogo(W / 2, H / 2 - 100, 0.7);

    ctx.textAlign = 'center';
    ctx.font = 'bold 36px Courier New';
    neonFill(COLORS.red, 12);
    ctx.fillText('GAME OVER', W / 2, H / 2 + 20);
    resetShadow();

    ctx.font = '24px Courier New';
    ctx.fillStyle = COLORS.yellow;
    ctx.fillText('FINAL SCORE: ' + score, W / 2, H / 2 + 70);
    ctx.fillStyle = COLORS.cyan;
    ctx.fillText('WAVES SURVIVED: ' + wave, W / 2, H / 2 + 100);

    const hs = loadHighScores();
    if (hs.length && hs[0].score === score) {
      ctx.fillStyle = COLORS.lime;
      ctx.fillText('★ NEW HIGH SCORE ★', W / 2, H / 2 + 130);
    }

    ctx.fillStyle = COLORS.white;
    ctx.font = '18px Courier New';
    const pulse = Math.sin(gameTime * 3) * 0.3 + 0.7;
    ctx.globalAlpha = pulse;
    ctx.fillText('TAP PLAY AGAIN BELOW', W / 2, H / 2 + 180);
    ctx.globalAlpha = 1;
  }

  function render() {
    ctx.save();
    let sx = 0, sy = 0;
    if (shake > 0) {
      sx = (Math.random() - 0.5) * shake;
      sy = (Math.random() - 0.5) * shake;
    }
    ctx.translate(sx, sy);

    ctx.fillStyle = COLORS.bg;
    ctx.fillRect(-10, -10, W + 20, H + 20);

    if (state === 'TITLE') {
      drawTitle();
      ctx.restore();
      return;
    }

    drawGrid();

    for (const e of enemyPool.active) {
      if (e.type !== 'hacker') continue;
      let target = null, best = 1e9;
      for (const n of nodes) {
        if (n.integrity <= 0) continue;
        const d = dist(e.x, e.y, n.x, n.y);
        if (d < best) { best = d; target = n; }
      }
      if (target && target.underAssault > 0) {
        ctx.save();
        neonStroke(NODE_ASSAULT, 1, 10);
        ctx.setLineDash([4, 6]);
        ctx.lineDashOffset = gameTime * 30;
        ctx.beginPath();
        ctx.moveTo(e.x, e.y);
        ctx.lineTo(target.x, target.y);
        ctx.stroke();
        ctx.setLineDash([]);
        resetShadow();
        ctx.restore();
      }
    }

    nodes.forEach(drawNode);
    drawPowerups();
    drawParticles();
    drawBullets();
    enemyPool.active.forEach(drawEnemy);
    drawPlayer();
    drawHUD();

    if (state === 'PAUSED') {
      ctx.fillStyle = 'rgba(0,0,0,0.6)';
      ctx.fillRect(0, 0, W, H);
      ctx.fillStyle = COLORS.cyan;
      ctx.font = 'bold 32px Courier New';
      ctx.textAlign = 'center';
      ctx.fillText('PAUSED', W / 2, H / 2);
    }

    if (state === 'GAMEOVER') drawGameOver();

    ctx.restore();
  }

  // ─── Main loop ─────────────────────────────────────────────────────────────
  let lastTime = performance.now();
  gameTime = 0;

  function loop(now) {
    const dt = Math.min(0.05, (now - lastTime) / 1000);
    lastTime = now;
    gameTime += dt;

    if (state === 'TITLE') {
      document.body.classList.add('title-cursor');
      document.body.classList.remove('gameover-tap');
      document.body.classList.remove('playing-ui');
      if (!getFullscreenElement()) document.body.classList.remove('pseudo-fullscreen');
      if (keys['Enter'] || keys['Space'] || mouseDown) {
        mouseDown = false;
        startGame();
      }
    } else if (state === 'GAMEOVER') {
      document.body.classList.add('gameover-tap');
      document.body.classList.remove('playing-ui');
      if (keys['Enter'] || keys['Space']) startGame();
    } else {
      document.body.classList.remove('gameover-tap');
      update(dt);
    }

    updateTouchUIVisibility();
    updateIosInstallBanner();
    updatePauseButton();
    positionPauseButton();
    if (state === 'TITLE' && audioCtx?.state === 'running') MusicDirector.sync();
    render();
    requestAnimationFrame(loop);
  }

  const screenTapEl = document.getElementById('screenTap');
  bindStartButton(document.getElementById('startBtn'));
  bindStartButton(document.getElementById('retryBtn'));

  function returnToTitle() {
    state = 'TITLE';
    document.body.classList.remove('playing-ui');
    updatePlayLayoutClasses();
    closeLeaderboard();
    exitGameFullscreen();
    stopMusicLoops();
    resetGame();
    resumeAudio().then(() => MusicDirector.start());
  }

  if (screenTapEl) {
    screenTapEl.addEventListener('touchend', handleScreenTapEvent, { passive: true });
    screenTapEl.addEventListener('click', handleScreenTapEvent);
    screenTapEl.addEventListener('keydown', (e) => {
      if (e.code === 'Enter' || e.code === 'Space') handleScreenTapEvent(e);
    });
  }

  document.addEventListener('click', (e) => {
    if (state === 'GAMEOVER' && !isUiControlTarget(e.target)) handleScreenTapEvent(e);
    else if (state === 'PLAYING' || state === 'PAUSED') resumeAudio();
  }, true);

  canvas.addEventListener('click', () => {
    if (state === 'PLAYING' || state === 'PAUSED') resumeAudio();
  });

  window.__bbStart = launchRun;

  requestAnimationFrame(loop);
})();
</script>
